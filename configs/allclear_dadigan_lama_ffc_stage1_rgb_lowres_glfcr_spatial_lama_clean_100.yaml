# Clean 100-epoch LaMa-loss-family variant.
#
# 目的：只保留 LaMa 原生 loss 家族，去掉 DaDiGAN KL 和其它额外监督。
# 说明：
# - 不照搬 LaMa cloudy-clear 的 weight_missing=0，因为 ALLClear 是 paired cloudy-clear，
#   云区有直接 GT，且上一轮 main_v2 已证明生成式项过强会偏向 SAR-like 低频结构。
# - 仍使用 LaMa 的 masked L1 / ResNetPL / R1 GAN / feature matching 这几类 loss。
run_name: allclear_dadigan_lama_ffc_rgb_lowres_glfcr_spatial_lama_clean_100
output_root: outputs/allclear
seed: 2026

data:
  root: /home/students/sushaoqi/CR/allclear_10pct_tx3_s2_s1_bucketed
  prefer_original_cld_shdw: false
  cache_dir: /home/students/sushaoqi/CR/allclear_10pct_tx3_s2_s1_bucketed/cache/omnicloudmask_v4_low300_mh1000_image256_sar
  train_manifest: /home/students/sushaoqi/CR/allclear_10pct_tx3_s2_s1_bucketed/omnicloudmask_v4_low300_mh1000/manifests/pairs_train.csv
  val_manifest: /home/students/sushaoqi/CR/allclear_10pct_tx3_s2_s1_bucketed/omnicloudmask_v4_low300_mh1000/manifests/pairs_val.csv
  test_manifest: /home/students/sushaoqi/CR/allclear_10pct_tx3_s2_s1_bucketed/omnicloudmask_v4_low300_mh1000/manifests/pairs_test.csv
  optical_scale: 10000.0
  load_sar: true
  image_size: 256
  model_band_indices: [3, 2, 1]
  rgb_indices: [0, 1, 2]
  model_reflectance_min: 0.0
  model_reflectance_max: 0.35
  shadow_index: 3
  cloud_index: 1

model:
  framework: dadigan_baseline
  s2_channels: 3
  sar_channels: 2
  dim: 96

  baseline_mask_mode: degraded
  baseline_output_mode: composite

  cloud_mask_input_mode: lama_zero
  cloud_append_mask: true
  cloud_mask_fill_value: 0.0
  cloud_output_activation: sigmoid

  cloud_lowres_glfcr_coupled: true
  cloud_lowres_factor: 2
  cloud_lowres_glfcr_kernel_size: 5
  cloud_lowres_opt_ffc_blocks: 9
  cloud_lowres_opt_ffc_ratio: 0.75
  cloud_lowres_opt_ffc_enable_lfu: false
  cloud_lowres_opt_ffc_spatial_transform_layers: [1, 4, 7]
  cloud_lowres_opt_ffc_spatial_transform_pad_coef: 0.5
  cloud_lowres_opt_ffc_spatial_transform_angle_init_range: 80
  cloud_lowres_opt_ffc_spatial_transform_train_angle: false

  cloud_ddin_steps: 4
  cloud_prox_blocks: 8
  cloud_reconstruct_blocks: 3
  cloud_cab_sr_ratio: 8
  cloud_cab_attention_mode: complement
  cloud_msab_mode: restormer_mdta

  cloud_pre_pda_context: none
  cloud_prefusion_context: none

  cloud_bottleneck_context: lama_ffc_feature
  cloud_ffc_blocks: 6
  cloud_ffc_ratio: 0.75
  cloud_ffc_enable_lfu: false
  cloud_ffc_downsample: 1
  cloud_ffc_spatial_transform_layers: [1, 3, 5]
  cloud_ffc_spatial_transform_pad_coef: 0.5
  cloud_ffc_spatial_transform_angle_init_range: 80
  cloud_ffc_spatial_transform_train_angle: false

  discriminator: pix2pixhd_nlayer
  cloud_discriminator_base_channels: 64
  cloud_discriminator_layers: 4
  cloud_discriminator_condition_mask: false

loss:
  profile: dadigan_lama_ffc

  # LaMa masked L1 family. 这里保留 missing 区 L1，是 paired ALLClear 任务的必要兼容。
  cloud_l1: 0.0
  cloud_l1_region: cloud
  cloud_l1_reduction: image_mean
  cloud_l1_missing: 70.0
  cloud_l1_known: 2.0

  # Clean LaMa-loss-family version: no DaDiGAN KL in RGB ablation.
  cloud_kl: 0.0
  cloud_kl_mode: softplus_sum
  cloud_kl_reduction: mask_mean

  # LaMa native uses R1 non-saturating GAN with mask_as_fake_target.
  # 权重按 main_v2 贡献比例下调，避免 GAN/FM 继续压过 paired GT L1。
  cloud_adv: 0.5
  adversarial_loss: r1
  r1_gp_coef: 0.001
  mask_as_fake_target: true
  allow_scale_mask: true
  mask_scale_mode: nearest
  cloud_gan_image: composite

  feature_matching: 50.0
  feature_matching_loss_type: mse
  perceptual: 8.0
  perceptual_type: hrf_resnet
  perceptual_weights_path: /home/students/sushaoqi/CR/main/pretrained/lama/ade20k/ade20k-resnet50dilated-ppm_deepsup/encoder_epoch_20.pth
  perceptual_input: cloud_context

loss_schedule:
  cloud_l1: {start_epoch: 1, ramp_epochs: 0}
  cloud_l1_missing: {start_epoch: 1, ramp_epochs: 0}
  cloud_l1_known: {start_epoch: 1, ramp_epochs: 0}
  cloud_kl: {start_epoch: 1, ramp_epochs: 0}
  perceptual: {start_epoch: 5, ramp_epochs: 10}
  feature_matching: {start_epoch: 15, ramp_epochs: 15}
  cloud_adv: {start_epoch: 15, ramp_epochs: 15}

train:
  epochs: 100
  batch_size: 4
  grad_accum_steps: 2
  val_batch_size: 6
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  optimizer: adam
  lr: 4.0e-5
  disc_lr: 1.0e-4
  weight_decay: 0.0
  distributed: ddp
  dist_backend: nccl
  ddp_find_unused_parameters: false
  optimizer_fused: false
  optimizer_foreach: false
  allow_tf32: true
  matmul_precision: high
  cudnn_benchmark: true
  torch_compile: false
  amp: true
  amp_dtype: bf16
  grad_clip_norm: 1.0
  lr_scheduler: none
  val_every: 1
  best_metric: pixel_total
  keep_best: 1

eval:
  batch_size: 6
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  visualize_splits: [val, test]
  visualization_checkpoint: best
  visual_buckets: [medium, high, heavy]
  visual_profile: dadigan_lama_ffc
  visual_samples_per_bucket: 5
  visual_candidate_pool_per_bucket: 50
  visual_rgb_stretch: panel
  visual_rgb_gamma: 0.72
  visual_rgb_gain: 1.08
